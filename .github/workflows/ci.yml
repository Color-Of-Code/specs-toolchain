name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Vet
        run: go vet ./...
        working-directory: cli
      - name: Test
        run: go test ./...
        working-directory: cli
      - name: Build
        run: go build ./...
        working-directory: cli

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Type-check & compile
        run: pnpm --filter ./extension run compile

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Prettier (check)
        run: pnpm run format:check
      - name: Markdown style
        run: go run ./cmd/specs lint --style
        working-directory: cli
