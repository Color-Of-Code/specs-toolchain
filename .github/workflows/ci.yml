name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml
      - name: Install extension deps
        run: pnpm install --frozen-lockfile
        working-directory: extension
      - name: Build webview bundle
        run: pnpm run build-webview
        working-directory: extension
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Vet
        run: go vet ./...
        working-directory: engine
      - name: Test
        run: go test ./...
        working-directory: engine
      - name: Build
        run: go build ./...
        working-directory: engine

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Type-check & compile
        run: pnpm run compile

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Format (check)
        run: go run ./cmd/specs format --check
        working-directory: engine
      - name: Markdown style
        run: go run ./cmd/specs lint --style
        working-directory: engine
