name: release
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run tests
        run: go test ./...
        working-directory: engine
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute version metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          path: engine/dist/
          retention-days: 1

  vsix:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
          - win32-x64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: extension
      - name: Download GoReleaser binaries
        uses: actions/download-artifact@v4
        with:
          name: goreleaser-dist
          # build-extension.ts looks for archives under <repo-root>/dist/.
          path: dist/
      - name: Build .vsix for ${{ matrix.target }}
        run: pnpm run package:bundled -- ${{ matrix.target }}
        working-directory: extension
        env:
          SPECS_VERSION: ${{ needs.release.outputs.version }}
      - name: Attach .vsix to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/specs-${{ matrix.target }}.vsix
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
